<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Time-Series Forecasting — benchmarking XGBoost, Prophet, LSTM, BiLSTM and hybrids">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#125a4d"/>
      <stop offset="1" stop-color="#1b9c85"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#e9c46a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: forecasting line chart with history (solid) + forecast (dashed) and axes -->
  <g transform="translate(980,190)" stroke="#e9c46a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- axes -->
    <path d="M -95 -70 L -95 70 L 95 70" stroke-width="4"/>
    <!-- historical series (solid) -->
    <path d="M -95 40 L -65 10 L -40 30 L -10 -15 L 15 5 L 35 -25"/>
    <!-- forecast continuation (dashed) -->
    <path d="M 35 -25 L 60 -40 L 90 -60" stroke-dasharray="3 16"/>
    <!-- data points -->
    <circle cx="-10" cy="-15" r="3.5" fill="#e9c46a" stroke="none"/>
    <circle cx="35" cy="-25" r="3.5" fill="#e9c46a" stroke="none"/>
    <circle cx="90" cy="-60" r="4.5" fill="#e9c46a" stroke="none"/>
  </g>

  <!-- wordmark (sized down so it clears the motif) -->
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Time-Series Forecasting</text>
  <text x="84" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" fill="#e9c46a">XGBoost · Prophet · LSTM · BiLSTM · Hybrid</text>
  <text x="84" y="266" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" fill="#dcefe9">A side-by-side benchmark of five forecasting approaches on one problem.</text>
  <text x="84" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#9ec9bf">python · pandas · scikit-learn · xgboost · prophet · tensorflow/keras</text>
</svg>
